---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: uptime-kuma
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://helm.irsigler.cloud
    chart: uptime-kuma
    targetRevision: 4.1.0
    helm:
      values: |
        image:
          repository: louislam/uptime-kuma
          tag: "2.3.0"
          pullPolicy: IfNotPresent

        # Persistence: local-path (mismo storage class que grafana/loki)
        volume:
          enabled: true
          accessMode: ReadWriteOnce
          size: 4Gi
          storageClassName: "local-path"

        # Service: ClusterIP interno, expuesto via Ingress Traefik
        service:
          type: ClusterIP
          port: 3001
          annotations: {}

        # Ingress: Traefik, websecure (HTTPS), como grafana-ingress.yaml
        ingress:
          enabled: true
          className: "traefik"
          annotations:
            kubernetes.io/ingress.class: traefik
            traefik.ingress.kubernetes.io/router.entrypoints: websecure
            traefik.ingress.kubernetes.io/router.tls: "true"
            # WebSockets son necesarios para el dashboard en vivo de Uptime-Kuma
            traefik.ingress.kubernetes.io/service.serverstransport: websecure@file
          hosts:
            - host: uptime.darylm.xyz
              paths:
                - path: /
                  pathType: Prefix
          tls: []

        # Resource limits (small footprint; ajusta si tienes muchos monitors)
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

        # Enganchar al kube-prometheus-stack que ya corre en monitoring
        serviceMonitor:
          enabled: true
          interval: 60s
          scrapeTimeout: 10s
          additionalLabels:
            release: kube-prometheus-stack

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
