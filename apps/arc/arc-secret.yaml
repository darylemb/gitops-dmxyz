---
# Secret template for ARC's GitHub authentication.
#
# ⚠️  DO NOT APPLY THIS FILE AS-IS. The `github_token` value below is a
#     placeholder. Apply imperatively with `kubectl create secret` so the
#     real PAT never touches Git history. See README.md in this directory.
#
# The Secret is consumed by the `AutoscalingRunnerSet` resources
# (apps/arc/arc-runners-*.yaml) via the `githubConfigSecret` field.
# The runner pods use it to register themselves with the GitHub API and
# receive job assignments over the long-poll listener connection.
apiVersion: v1
kind: Secret
metadata:
  name: arc-github-secret
  # Secret MUST live in the same namespace as the AutoscalingRunnerSet
  # resources (default: arc-runners). The runner pods mount it via the
  # listener, not directly.
  namespace: arc-runners
  labels:
    app.kubernetes.io/name: actions-runner-controller
    app.kubernetes.io/component: github-credentials
type: Opaque
stringData:
  # REPLACE_ME — generate a new PAT at:
  #   https://github.com/settings/tokens/new
  #
  # Required scopes:
  #   - repo (full) — lets the runner register against the repo
  #
  # The PAT must be a classic token (`ghp_...`), NOT a fine-grained
  # token and NOT a GitHub App installation token (`ghs_...`). ARC's
  # GitHub API client only supports classic PATs.
  github_token: "REPLACE_ME_VIA_KUBECTL_CREATE_BEFORE_FIRST_RUNNER_BOOT"
