---
# code-server settings.json (read by the running container via /config mount).
# Mounted as a ConfigMap into /config/settings.json to give Daryl a sane
# default config (theme, font, Git integration, etc.) without needing to
# configure it manually on first login.
#
# This file is applied via the chart's `extraVolumeMounts` mechanism (see
# code-server.yaml) — code-server reads /config/settings.json at boot.
apiVersion: v1
kind: ConfigMap
metadata:
  name: code-server-settings
  namespace: code-server
  labels:
    app: code-server
    app.kubernetes.io/managed-by: gitops-dmxyz
data:
  settings.json: |
    {
      "workbench.colorTheme": "Default Dark+",
      "workbench.startupEditor": "welcomePage",
      "editor.fontSize": 14,
      "editor.fontFamily": "'JetBrains Mono', 'Fira Code', Menlo, monospace",
      "editor.fontLigatures": true,
      "editor.minimap.enabled": false,
      "editor.tabSize": 2,
      "editor.formatOnSave": true,
      "editor.bracketPairColorization.enabled": true,
      "editor.guides.bracketPairs": true,
      "files.autoSave": "afterDelay",
      "files.autoSaveDelay": 1000,
      "files.trimTrailingWhitespace": true,
      "files.insertFinalNewline": true,
      "terminal.integrated.fontSize": 13,
      "terminal.integrated.shell.linux": "/bin/bash",
      "git.autofetch": true,
      "git.confirmSync": false,
      "extensions.supportUntrustedWorkspaces": {
        "dbaeumer.vscode-eslint": true,
        "esbenp.prettier-vscode": true
      },
      "security.workspace.trust.enabled": true,
      "security.workspace.trust.startupPrompt": "always",
      "telemetry.telemetryLevel": "off",
      "update.mode": "manual"
    }

  # Disable code-server's built-in update check (we control upgrades via
  # the chart's targetRevision in code-server.yaml).
  code-server-config.yaml: |
    bind-addr: 0.0.0.0:8443
    auth: password
    password: ${PASSWORD_FROM_SECRET}
    cert: false
    disable-telemetry: true
    disable-update-check: true
    log: info
    trusted-origins:
      - https://code.darylm.xyz