---
# Argo CD Ingress with cert-manager + Let's Encrypt.
#
# Same pattern as grafana-ingress.yaml. cert-manager issues a cert for
# argo.darylm.xyz, Traefik serves it on :443, OCI LB does TCP passthrough.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argo-ingress
  namespace: argocd
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - argo.darylm.xyz
      secretName: argo-darylm-xyz-tls
  rules:
    - host: argo.darylm.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
