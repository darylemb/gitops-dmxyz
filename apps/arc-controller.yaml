---
# Argo CD Application for Actions Runner Controller (ARC) — the operator
# that orchestrates self-hosted GitHub Actions runners on k3s.
#
# Chart: actions-runner-controller/actions-runner-controller v0.23.7
#   (app version 0.23.7, supports k8s 1.30+ — Ampere runs k3s 1.34.3)
#
# Source: OCI registry maintained by the GitHub Actions team + community
#   oci://ghcr.io/actions/actions-runner-controller-charts/actions-runner-controller
#
# The controller runs in the `arc-systems` namespace and manages
# AutoscalingRunnerSet resources (defined in companion apps) that schedule
# the actual runner pods in the `arc-runners` namespace.
#
# After this Application is Synced, you need to:
#   1. Create the GitHub PAT Secret (see apps/arc/secret.yaml) — manual, one-time
#   2. Apply the AutoscalingRunnerSet resources (apps/arc/arc-runners-*.yaml)
#   3. Reference the runner labels in your workflow `runs-on:` lines
#
# This PR covers ONLY step 1.2 (the controller). The runner scale sets
# land in follow-up PRs.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-controller
  namespace: argocd
  labels:
    app: arc-controller
spec:
  project: default
  source:
    repoURL: ghcr.io/actions/actions-runner-controller-charts
    chart: actions-runner-controller
    targetRevision: v0.23.7
    helm:
      values: |
        # No custom values needed at the controller level. The controller
        # only orchestrates; all runner-specific config lives in the
        # AutoscalingRunnerSet resources (apps/arc/arc-runners-*.yaml).
        #
        # Default behavior:
        #   - Single controller replica (stateless, no HA needed for single-user)
        #   - No persistent storage
        #   - Listens for AutoscalingRunnerSet CRs cluster-wide (or per-namespace
        #     if configured via --watch-single-namespace)
  destination:
    server: https://kubernetes.default.svc
    namespace: arc-systems
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
