---
# Argo CD Application for Actions Runner Controller (ARC) — the operator
# that orchestrates self-hosted GitHub Actions runners on k3s.
#
# Chart: gha-runner-scale-set-controller 0.14.2
#   (app version 0.14.2, supports k8s 1.30+ — Ampere runs k3s 1.34.3)
#
# Source: OCI registry maintained by the GitHub Actions team
#   oci://ghcr.io/actions/actions-runner-controller-charts
#   chart: gha-runner-scale-set-controller
#   revision: 0.14.2
#
# IMPORTANT: do NOT use the chart name `actions-runner-controller` — that
# doesn't exist in this OCI registry. The OCI registry hosts two charts:
#   - gha-runner-scale-set              (the runner chart, used in apps/arc-runners-*.yaml)
#   - gha-runner-scale-set-controller   (the controller chart, this one)
#
# Both are at OCI revision `0.14.2` (no `v` prefix in OCI tags).
#
# The controller runs in the `arc-systems` namespace and manages
# AutoscalingRunnerSet resources (defined in companion apps) that schedule
# the actual runner pods in the `arc-runners` namespace.
#
# After this Application is Synced, you need to:
#   1. Create the GitHub PAT Secret (one-time manual; see PR #16 /
#      apps/arc/arc-README.md) — the Secret must exist in the
#      `arc-runners` namespace BEFORE the listener can register
#   2. Apply the AutoscalingRunnerSet resources (apps/arc-runners-*.yaml)
#   3. Reference the runner labels in your workflow `runs-on:` lines
#
# This PR covers step 1.1 (the controller). The runner scale sets
# land in follow-up PRs (#17, #18).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-controller
  namespace: argocd
  labels:
    app: arc-controller
spec:
  project: default
  source:
    repoURL: ghcr.io/actions/actions-runner-controller-charts
    chart: gha-runner-scale-set-controller
    targetRevision: 0.14.2
    helm:
      values: |
        # No custom values needed at the controller level. The controller
        # only orchestrates; all runner-specific config lives in the
        # AutoscalingRunnerSet resources (apps/arc-runners-*.yaml).
        #
        # Default behavior:
        #   - Single controller replica (stateless, no HA needed for single-user)
        #   - No persistent storage
        #   - Listens for AutoscalingRunnerSet CRs cluster-wide
  destination:
    server: https://kubernetes.default.svc
    namespace: arc-systems
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
