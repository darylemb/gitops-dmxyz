---
# Argo CD Application for the ambar-web ARC runner scale set.
#
# Dedicated runner pool for the darylemb/ambar-web repo. Replaces the
# legacy Coolify-managed runners that lived on rocky-server.
#
# Per GitHub docs (https://docs.github.com/en/actions/how-tos/manage-runners/
# use-actions-runner-controller/deploy-runner-scale-sets):
#   - The runner container MUST be named "runner"
#   - The runner container MUST have command: ["/home/runner/run.sh"]
#     so the actions-runner binary launches and connects to GitHub
#   - Without this command, the container starts, finds nothing to run,
#     and exits 0 immediately (the EphemeralRunner appears as Succeeded
#     but never actually connects to GitHub to receive the job).
#
# nodeName pinning to instance-20250822-0701 (Ampere) is required because
# rocky-worker has DNS resolution issues with api.github.com due to a
# WireGuard cross-node bug.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-runner-ambar-web-set
  namespace: argocd
  labels:
    app: arc-runner-ambar-web-set
spec:
  project: default
  source:
    repoURL: ghcr.io/actions/actions-runner-controller-charts
    chart: gha-runner-scale-set
    targetRevision: 0.14.2
    helm:
      values: |
        githubConfigUrl: "https://github.com/darylemb/ambar-web"
        githubConfigSecret: arc-github-secret
        controllerServiceAccount:
          namespace: arc-systems
          name: arc-controller-gha-rs-controller
        minRunners: 0
        maxRunners: 2
        scaleSetLabels:
          - ambar-web
        listenerTemplate:
          spec:
            containers:
              - name: listener
            nodeName: instance-20250822-0701
        template:
          spec:
            nodeName: instance-20250822-0701
            containers:
              - name: runner
                image: ghcr.io/actions/actions-runner:latest
                command: ["/home/runner/run.sh"]
                resources:
                  requests:
                    cpu: 500m
                    memory: 1Gi
                  limits:
                    cpu: 2
                    memory: 4Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: arc-runners
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
