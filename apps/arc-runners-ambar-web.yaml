---
# Argo CD Application for the ambar-web ARC runner scale set.
#
# Dedicated runner pool for the darylemb/ambar-web repo. Replaces the
# legacy Coolify-managed runners that lived on rocky-server.
#
# Why pin to Ampere (instance-20250822-0701):
#   rocky-worker has DNS resolution issues with api.github.com
#   (WireGuard cross-node bug). The listener gets stuck queued because
#   it can't fetch the runner registration token from GitHub.
#   We use nodeAffinity in BOTH listenerTemplate and template to force
#   scheduling on Ampere. nodeAffinity is preferred over nodeName because
#   if Ampere is down, K8s won't schedule (vs nodeName which is a hard
#   constraint that may cause failures). For this app we want hard pinning.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-runner-ambar-web-set
  namespace: argocd
  labels:
    app: arc-runner-ambar-web-set
spec:
  project: default
  source:
    repoURL: ghcr.io/actions/actions-runner-controller-charts
    chart: gha-runner-scale-set
    targetRevision: 0.14.2
    helm:
      values: |
        githubConfigUrl: "https://github.com/darylemb/ambar-web"
        githubConfigSecret: arc-github-secret
        controllerServiceAccount:
          namespace: arc-systems
          name: arc-controller-gha-rs-controller
        minRunners: 0
        maxRunners: 2
        scaleSetLabels:
          - ambar-web
        listenerTemplate:
          spec:
            containers:
              - name: listener
            nodeName: instance-20250822-0701
        template:
          spec:
            nodeName: instance-20250822-0701
            containers:
              - name: runner
                image: ghcr.io/actions/actions-runner:latest
                resources:
                  requests:
                    cpu: 500m
                    memory: 1Gi
                  limits:
                    cpu: 2
                    memory: 4Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: arc-runners
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
