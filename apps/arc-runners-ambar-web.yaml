---
# Argo CD Application for the ambar-web ARC runner scale set.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-runner-ambar-web-set
  namespace: argocd
  labels:
    app: arc-runner-ambar-web-set
spec:
  project: default
  source:
    repoURL: ghcr.io/actions/actions-runner-controller-charts
    chart: gha-runner-scale-set
    targetRevision: 0.14.2
    helm:
      values: |
        githubConfigUrl: "https://github.com/darylemb/ambar-web"
        githubConfigSecret: arc-github-secret
        controllerServiceAccount:
          namespace: arc-systems
          name: arc-controller-gha-rs-controller
        minRunners: 0
        maxRunners: 2
        scaleSetLabels:
          - ambar-web
        template:
          spec:
            containers:
              - name: runner
                image: ghcr.io/actions/actions-runner:latest
                resources:
                  requests:
                    cpu: 500m
                    memory: 1Gi
                  limits:
                    cpu: 2
                    memory: 4Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: arc-runners
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m