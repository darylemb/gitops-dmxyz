# code-server admin password.
#
# This file is a TEMPLATE only — the actual Secret is created manually
# in the cluster (NOT applied via Argo). See README section below.
#
# Pattern mirrors gitea-admin-secret approach: password in cluster Secret,
# chart's existingSecret references it. To rotate:
#   1. openssl rand -hex 32
#   2. kubectl create secret generic code-server-admin \
#        --namespace=code-server --from-literal=password=<new> \
#        --dry-run=client -o yaml | kubectl apply -f -
#   3. Restart the code-server pod (or let Argo selfHeal).
---
# Template for the Secret (DO NOT APPLY THIS FILE — create manually).
apiVersion: v1
kind: Secret
metadata:
  name: code-server-admin
  namespace: code-server
type: Opaque
stringData:
  # Replace with output of: openssl rand -hex 32
  password: "REPLACE_WITH_OPENSSL_RAND_HEX_32"