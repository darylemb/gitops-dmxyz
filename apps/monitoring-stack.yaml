apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 80.14.4
    helm:
      values: |
        alertmanager:
          alertmanagerSpec:
            # Reemplaza el receiver "null" por defecto con uno que entrega a un webhook
            # (URL placeholder - cambiar por Discord/Telegram/Slack/etc cuando esté listo)
            config:
              global:
                resolve_timeout: 5m
              route:
                group_by: ['namespace', 'alertname']
                group_wait: 30s
                group_interval: 5m
                repeat_interval: 4h
                receiver: 'webhook-default'
                routes:
                - matchers:
                  - severity = "critical"
                  receiver: 'webhook-critical'
                  group_wait: 10s
              receivers:
              - name: 'webhook-default'
                webhookConfigs:
                - url: 'http://placeholder.local/alerts'
                  sendResolved: true
              - name: 'webhook-critical'
                webhookConfigs:
                - url: 'http://placeholder.local/alerts-critical'
                  sendResolved: true
              inhibit_rules:
              - equal: ['namespace', 'alertname']
                source_matchers: ['severity = critical']
                target_matchers: ['severity =~ warning|info']
          # Persistir configuración via secret externo (para no perder en upgrades)
          # Por ahora usa el config inline (auto-genera secret alertmanager-kube-prometheus-stack-alertmanager)
        grafana:
          assertNoLeakedSecrets: false
          envFromSecret: "grafana-db-secret"
          initChownData:
            enabled: false
          grafana.ini:
            security:
              allow_embedding: true
              cookie_samesite: lax
          sidecar:
            dashboards:
              enabled: true
              label: grafana_dashboard
              provider:
                allowUiUpdates: true
          additionalDataSources:
            - name: Loki
              type: loki
              url: http://loki-stack.monitoring:3100
              isDefault: false
          persistence:
            enabled: true
            storageClassName: "local-path"
            accessModes: ["ReadWriteOnce"]
            size: 5Gi
        prometheus:
          prometheusSpec:
            # Cargar reglas custom desde manifests externos
            # (el archivo disk-usage-alerts.yaml se aplica via root-app o AppSet)
            ruleSelector:
              matchLabels:
                release: kube-prometheus-stack
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: "local-path"
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 5Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ServerSideApply=true
    - Replace=true