apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/darylemb/gitops-dmxyz.git
    targetRevision: HEAD
    path: apps/
    # Excluir archivos que tienen su propia Application dedicada
    # (disk-usage-alerts.yaml es manejado por apps/disk-usage-alerts-app.yaml)
    directory:
      exclude:
        - disk-usage-alerts.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
